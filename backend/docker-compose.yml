version: '3.8'

services:
  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_devops_app
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PORT=8000
      - ENV_TYPE=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
